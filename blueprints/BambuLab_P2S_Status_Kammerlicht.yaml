blueprint:
  name: "BambuLab P2S – Statusleuchte & Kammerlicht"
  description: >-
    Steuert automatisch eine externe RGB-Statusleuchte und das Kammerlicht
    des BambuLab P2S anhand des aktuellen Druckstatus.

    ════════════════════════════════════════════
    🟢 GRÜN        → Druck abgeschlossen (finish)
    🟠 ORANGE       → In Vorbereitung (prepare / init / slicing)
    🔴 ROT (Puls)  → Fehler (HMS / Druckfehler / Status "failed")
    🔵 BLAU        → Im Druck – Helligkeit spiegelt Fortschritt wider
                     (1 % = fast dunkel · 100 % = volle Helligkeit)
    ════════════════════════════════════════════

    Kammerlicht-Logik:
      • Kein Druck aktiv  → Licht folgt Türsensor (offen = an, zu = aus)
      • Vorbereitung/Druck → Kammerlicht immer an (konfigurierbar)
      • Fehler            → Kammerlicht bleibt an

    Nachtbetrieb (optional):
      • Druck fertig → Statusleuchte Grün für X Minuten, dann aus
      • Morgens um eingestellter Uhrzeit → Statusleuchte Grün als Erinnerung
      • Ohne Nachtbetrieb → Statusleuchte bleibt dauerhaft Grün bis zum Reset

    Kompatibel mit: ha-bambulab Integration (greghesp/ha-bambulab)

  domain: automation
  author: Elemirus1996
  homeassistant:
    min_version: "2024.6.0"

  input:

    # ──────────────────────────────────────────
    # DRUCKER-SENSOREN
    # ──────────────────────────────────────────
    print_status_sensor:
      name: "📊 Druckstatus-Sensor"
      description: >-
        BambuLab Sensor für den aktuellen Druckstatus.
        Mögliche Werte: idle, prepare, init, slicing, running,
        pause, finish, failed, offline, unknown
      selector:
        entity:
          domain: sensor

    print_progress_sensor:
      name: "📈 Druckfortschritt-Sensor"
      description: >-
        BambuLab Sensor für den Druckfortschritt in Prozent (0–100).
      selector:
        entity:
          domain: sensor

    door_sensor:
      name: "🚪 Gehäusetür-Sensor"
      description: >-
        BambuLab Binärsensor für die Gehäusetür.
        Zustand: on = Tür geöffnet | off = Tür geschlossen
      selector:
        entity:
          domain: binary_sensor

    hms_error_sensor:
      name: "⚠️ HMS-Fehler-Sensor"
      description: >-
        BambuLab Binärsensor für HMS-Fehler.
        Zustand: on = Fehler aktiv
      selector:
        entity:
          domain: binary_sensor

    print_error_sensor:
      name: "🚨 Druckfehler-Sensor"
      description: >-
        BambuLab Binärsensor für allgemeine Druckfehler.
        Zustand: on = Fehler aktiv
      selector:
        entity:
          domain: binary_sensor

    # ──────────────────────────────────────────
    # LICHTER
    # ──────────────────────────────────────────
    chamber_light_entity:
      name: "💡 Kammerlicht (BambuLab)"
      description: >-
        Das integrierte Kammerlicht des BambuLab P2S.
      selector:
        entity:
          domain: light

    status_light_entity:
      name: "🌈 Statusleuchte (RGB)"
      description: >-
        Externe RGB-Lampe als Statusanzeige.
        ⚠️ Muss RGB-Farben UND Helligkeit unterstützen!
      selector:
        entity:
          domain: light

    # ──────────────────────────────────────────
    # KAMMERLICHT-OPTIONEN
    # ──────────────────────────────────────────
    chamber_light_while_printing:
      name: "💡 Kammerlicht während des Drucks"
      description: >-
        Soll das Kammerlicht während Vorbereitung und Druck
        automatisch eingeschaltet bleiben?
      default: true
      selector:
        boolean:

    # ──────────────────────────────────────────
    # STATUSLEUCHTEN-OPTIONEN
    # ──────────────────────────────────────────
    idle_status_light_mode:
      name: "💤 Statusleuchte im Leerlauf"
      description: >-
        Verhalten der Statusleuchte wenn kein Druck aktiv ist
        (Status: idle / offline / unknown).
      default: "off"
      selector:
        select:
          options:
            - label: "Ausschalten"
              value: "off"
            - label: "Weiß (10 % Helligkeit – Nachtlicht)"
              value: "white_dim"

    min_brightness_pct:
      name: "🔆 Mindesthelligkeit Blau bei 0 % Fortschritt"
      description: >-
        Damit die blaue Statusleuchte auch bei 0 % Druckfortschritt
        noch sichtbar ist. Empfohlen: 5–10 %.
      default: 5
      selector:
        number:
          min: 1
          max: 25
          step: 1
          unit_of_measurement: "%"
          mode: slider

    # ──────────────────────────────────────────
    # FEHLER-BLINKEN
    # ──────────────────────────────────────────
    error_blink_on_sec:
      name: "🔴 Fehler-Blinken: AN-Zeit"
      description: >-
        Wie lange leuchtet die rote LED pro Blink-Zyklus auf?
        Empfohlen: 0.5 Sekunden
      default: 0.5
      selector:
        number:
          min: 0.2
          max: 3.0
          step: 0.1
          unit_of_measurement: "s"
          mode: slider

    error_blink_off_sec:
      name: "🔴 Fehler-Blinken: AUS-Zeit"
      description: >-
        Wie lange ist die LED pro Blink-Zyklus aus?
        Empfohlen: 0.5 Sekunden
      default: 0.5
      selector:
        number:
          min: 0.2
          max: 3.0
          step: 0.1
          unit_of_measurement: "s"
          mode: slider

    # ──────────────────────────────────────────
    # 🌙 NACHTBETRIEB
    # ──────────────────────────────────────────
    night_mode_enabled:
      name: "🌙 Nachtbetrieb aktivieren"
      description: >-
        Wenn aktiv: Statusleuchte geht nach dem Druck-Ende nur kurz an
        und schaltet sich dann automatisch aus.
        Morgens um die eingestellte Uhrzeit leuchtet sie wieder auf
        falls der Druck noch nicht entnommen wurde.
      default: false
      selector:
        boolean:

    night_display_minutes:
      name: "🌙 Anzeigedauer nach Druck-Ende (Minuten)"
      description: >-
        Wie lange soll die grüne Statusleuchte nach dem Druck-Ende
        leuchten bevor sie im Nachtbetrieb ausgeht?
      default: 2
      selector:
        number:
          min: 1
          max: 60
          step: 1
          unit_of_measurement: "min"
          mode: slider

    night_wakeup_time:
      name: "🌙 Morgens wieder einschalten um"
      description: >-
        Um diese Uhrzeit leuchtet die Statusleuchte wieder Grün auf
        – als Erinnerung dass ein fertiger Druck entnommen werden kann.
        Nur aktiv wenn Nachtbetrieb eingeschaltet ist.
      default: "07:00:00"
      selector:
        time:

# ══════════════════════════════════════════════════════
# AUTOMATION-KONFIGURATION
# ══════════════════════════════════════════════════════
mode: restart
max_exceeded: silent

variables:
  v_status:          !input print_status_sensor
  v_progress:        !input print_progress_sensor
  v_door:            !input door_sensor
  v_hms:             !input hms_error_sensor
  v_err:             !input print_error_sensor
  v_idle_mode:       !input idle_status_light_mode
  v_chamber_print:   !input chamber_light_while_printing
  v_min_bright_pct:  !input min_brightness_pct
  v_blink_on:        !input error_blink_on_sec
  v_blink_off:       !input error_blink_off_sec
  v_night_mode:      !input night_mode_enabled
  v_night_min:       !input night_display_minutes

# ══════════════════════════════════════════════════════
# TRIGGER
# ══════════════════════════════════════════════════════
trigger:
  - platform: state
    entity_id: !input print_status_sensor
    id: "status_changed"

  - platform: state
    entity_id: !input print_progress_sensor
    id: "progress_changed"

  - platform: state
    entity_id: !input door_sensor
    id: "door_changed"

  - platform: state
    entity_id: !input hms_error_sensor
    id: "hms_changed"

  - platform: state
    entity_id: !input print_error_sensor
    id: "error_changed"

  - platform: homeassistant
    event: start
    id: "ha_start"

  # Nachtbetrieb: Morgens-Erinnerung
  # (Wird nur verarbeitet wenn Nachtbetrieb aktiv und Drucker noch auf "finish" steht)
  - platform: time
    at: !input night_wakeup_time
    id: "morning_wakeup"

# ══════════════════════════════════════════════════════
# AKTIONEN
# ══════════════════════════════════════════════════════
action:

  # ── FRÜHER ABBRUCH 1 ────────────────────────────────────────────────────────
  # Türsensor-Trigger während "finish": Status-LED NICHT anfassen.
  # Das Kammerlicht bleibt ohnehin an (wurde bei finish eingeschaltet).
  # Ohne diesen Stopp würde mode:restart die Finish-Sequenz neu starten
  # → Grünlicht käme im Nachtbetrieb nach dem Timeout wieder an.
  - if:
      - condition: trigger
        id: "door_changed"
      - condition: template
        value_template: "{{ is_state(v_status, 'finish') }}"
    then:
      - stop: "Tür-Änderung während finish – Status-LED bleibt unverändert"

  # ── FRÜHER ABBRUCH 2 ────────────────────────────────────────────────────────
  # Fortschritts-Trigger wenn NICHT aktiv gedruckt wird: ignorieren.
  # Der Fortschritt bleibt nach dem Druck bei 100% und ändert sich erst
  # wieder beim nächsten Druck – dieser Trigger soll dann nicht die
  # Finish- oder Idle-Logik neu starten.
  - if:
      - condition: trigger
        id: "progress_changed"
      - condition: template
        value_template: >-
          {{ not (is_state(v_status, 'running') or is_state(v_status, 'pause')) }}
    then:
      - stop: "Fortschritts-Änderung außerhalb aktiven Drucks – ignoriert"

  # ── HAUPTLOGIK ──────────────────────────────────────────────────────────────
  - choose:

    # ┌─────────────────────────────────────────────────────────┐
    # │  🔴 FEHLER  –  Rot pulsierend  (höchste Priorität)      │
    # └─────────────────────────────────────────────────────────┘
      - conditions:
          - condition: template
            value_template: >-
              {{ is_state(v_hms, 'on')
                 or is_state(v_err, 'on')
                 or is_state(v_status, 'failed') }}
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input chamber_light_entity

          - repeat:
              while:
                - condition: template
                  value_template: >-
                    {{ is_state(v_hms, 'on')
                       or is_state(v_err, 'on')
                       or is_state(v_status, 'failed') }}
              sequence:
                - service: light.turn_on
                  target:
                    entity_id: !input status_light_entity
                  data:
                    rgb_color: [255, 0, 0]
                    brightness: 255
                    transition: 0

                - delay:
                    milliseconds: "{{ (v_blink_on | float(0.5) * 1000) | int }}"

                - service: light.turn_off
                  target:
                    entity_id: !input status_light_entity
                  data:
                    transition: 0

                - delay:
                    milliseconds: "{{ (v_blink_off | float(0.5) * 1000) | int }}"

    # ┌─────────────────────────────────────────────────────────┐
    # │  🔵 IM DRUCK  –  Blau, Helligkeit = Fortschritt %       │
    # └─────────────────────────────────────────────────────────┘
      - conditions:
          - condition: template
            value_template: >-
              {{ is_state(v_status, 'running')
                 or is_state(v_status, 'pause') }}
        sequence:
          - if:
              - condition: template
                value_template: "{{ v_chamber_print | bool(true) }}"
            then:
              - service: light.turn_on
                target:
                  entity_id: !input chamber_light_entity

          - service: light.turn_on
            target:
              entity_id: !input status_light_entity
            data:
              rgb_color: [0, 80, 255]
              transition: 2
              brightness: >-
                {% set pct = states(v_progress) | int(0) %}
                {% set min_b = (v_min_bright_pct | int(5)) * 2.55 %}
                {% set brightness = (min_b + (pct / 100.0) * (255.0 - min_b)) | int %}
                {{ [brightness, 255] | min | int }}

    # ┌─────────────────────────────────────────────────────────┐
    # │  🟠 VORBEREITUNG  –  Orange                             │
    # └─────────────────────────────────────────────────────────┘
      - conditions:
          - condition: template
            value_template: >-
              {{ is_state(v_status, 'prepare')
                 or is_state(v_status, 'init')
                 or is_state(v_status, 'slicing') }}
        sequence:
          - if:
              - condition: template
                value_template: "{{ v_chamber_print | bool(true) }}"
            then:
              - service: light.turn_on
                target:
                  entity_id: !input chamber_light_entity

          - service: light.turn_on
            target:
              entity_id: !input status_light_entity
            data:
              rgb_color: [255, 120, 0]
              brightness: 255
              transition: 1

    # ┌─────────────────────────────────────────────────────────┐
    # │  🟢 FERTIG  –  Grün (mit optionalem Nachtbetrieb)       │
    # └─────────────────────────────────────────────────────────┘
      - conditions:
          - condition: template
            value_template: "{{ is_state(v_status, 'finish') }}"
        sequence:
          # Kammerlicht an (Druck kann entnommen werden)
          - service: light.turn_on
            target:
              entity_id: !input chamber_light_entity

          - choose:

            # ── Fall 1: Morgens-Erinnerung ────────────────────────
            # Nachtbetrieb war aktiv, jetzt ist Morgen → dauerhaft Grün
              - conditions:
                  - condition: trigger
                    id: "morning_wakeup"
                  - condition: template
                    value_template: "{{ v_night_mode | bool(false) }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input status_light_entity
                    data:
                      rgb_color: [0, 255, 30]
                      brightness: 255
                      transition: 1

            # ── Fall 2: Nachtbetrieb aktiv ────────────────────────
            # Grün für X Minuten, dann automatisch aus
              - conditions:
                  - condition: template
                    value_template: "{{ v_night_mode | bool(false) }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input status_light_entity
                    data:
                      rgb_color: [0, 255, 30]
                      brightness: 255
                      transition: 1

                  # X Minuten warten
                  - delay:
                      minutes: "{{ v_night_min | int(2) }}"

                  # Nur ausschalten wenn Drucker noch auf "finish" steht
                  # (falls zwischenzeitlich ein Fehler kam oder idle → bereits behandelt)
                  - condition: template
                    value_template: "{{ is_state(v_status, 'finish') }}"

                  - service: light.turn_off
                    target:
                      entity_id: !input status_light_entity
                    data:
                      transition: 2

            # ── Fall 3: Normalbetrieb ─────────────────────────────
            # Kein Nachtbetrieb → dauerhaft Grün bis Drucker auf idle
            default:
              - service: light.turn_on
                target:
                  entity_id: !input status_light_entity
                data:
                  rgb_color: [0, 255, 30]
                  brightness: 255
                  transition: 1

    # ┌─────────────────────────────────────────────────────────┐
    # │  💤 LEERLAUF  –  Kammerlicht folgt Tür                  │
    # │  Status: idle | offline | unknown                       │
    # └─────────────────────────────────────────────────────────┘
      - conditions:
          - condition: template
            value_template: >-
              {{ is_state(v_status, 'idle')
                 or is_state(v_status, 'offline')
                 or is_state(v_status, 'unknown') }}
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(v_door, 'on') }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input chamber_light_entity
            default:
              - service: light.turn_off
                target:
                  entity_id: !input chamber_light_entity

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ v_idle_mode == 'white_dim' }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input status_light_entity
                    data:
                      rgb_color: [255, 255, 255]
                      brightness: 25
                      transition: 2
            default:
              - service: light.turn_off
                target:
                  entity_id: !input status_light_entity
                data:
                  transition: 2
