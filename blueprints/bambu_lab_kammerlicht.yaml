blueprint:
  name: "Bambu Lab – Kammerlicht Steuerung"
  description: >
    Steuert das Kammerlicht und optionale externe Status-/Fehlerleuchten eines
    Bambu Lab Druckers automatisch anhand von Druckstatus, aktuellem Arbeitsschritt,
    Türstatus und Druckfortschritt.
  domain: automation
  author: Elemirus1996
  source_url: https://raw.githubusercontent.com/Elemirus1996/ha-blueprint_BambuLab-P2S-Kammer-Licht/main/blueprints/bambu_lab_kammerlicht.yaml

  input:
    basis:
      name: "Basis-Einstellungen"
      icon: mdi:printer-3d
      input:
        print_status_sensor:
          name: Druckstatus Sensor
          description: "Beispiel: sensor.drucker_p2s_druckstatus"
          selector:
            entity:
              domain: sensor

        current_stage_sensor:
          name: Aktueller Arbeitsschritt Sensor
          description: "Beispiel: sensor.drucker_p2s_aktueller_arbeitsschritt"
          selector:
            entity:
              domain: sensor

        print_progress_sensor:
          name: Druckfortschritt Sensor (%)
          description: "Beispiel: sensor.drucker_p2s_druckfortschritt"
          selector:
            entity:
              domain: sensor

        door_sensor:
          name: Gehäusetür Sensor
          description: "Beispiel: binary_sensor.drucker_p2s_gehausetur"
          selector:
            entity:
              domain: binary_sensor

        chamber_light:
          name: Druckraumbeleuchtung
          description: "Beispiel: light.drucker_p2s_druckraumbeleuchtung"
          selector:
            entity:
              domain: light

    statusleuchte:
      name: "Externe Statusleuchte"
      icon: mdi:lightbulb-on
      collapsed: true
      input:
        status_light:
          name: Externe Statusleuchte
          description: >
            Optionale separate Leuchte für Druckerstatus.
            AUS = Leerlauf
            Orange 50 % = Vorbereitung
            Blau pulsierend = Druck läuft
            Grün pulsierend = Druck fertig
            Rot pulsierend = Fehler
          default: []
          selector:
            entity:
              domain: light

        enable_progress_brightness:
          name: Helligkeit nach Druckfortschritt
          description: >
            Wenn aktiviert, wird die Helligkeit der blauen Statusleuchte beim Drucken
            anhand des Fortschritts in 5-%-Schritten angepasst.
          default: true
          selector:
            boolean:

        running_pulse_seconds:
          name: Puls-Takt Drucken (Sekunden)
          default: 2
          selector:
            number:
              min: 0.5
              max: 10
              step: 0.5
              unit_of_measurement: s
              mode: slider

        finished_pulse_seconds:
          name: Puls-Takt Fertig (Sekunden)
          default: 2
          selector:
            number:
              min: 0.5
              max: 10
              step: 0.5
              unit_of_measurement: s
              mode: slider

        error_pulse_seconds:
          name: Puls-Takt Fehler (Sekunden)
          default: 1
          selector:
            number:
              min: 0.5
              max: 10
              step: 0.5
              unit_of_measurement: s
              mode: slider

        status_error_brightness:
          name: Statusleuchte Helligkeit bei Fehler
          default: 255
          selector:
            number:
              min: 1
              max: 255
              step: 1
              mode: slider

    diagnose:
      name: "Diagnose / Fehlererkennung"
      icon: mdi:stethoscope
      collapsed: true
      input:
        diagnosis_error_sensors:
          name: Diagnose Fehler-Sensoren
          description: >
            Optional. Ein oder mehrere Fehler-Sensoren der Integration.
            Beispiele: binary_sensor.drucker_p2s_druckfehler, binary_sensor.drucker_p2s_hms_fehler
          default: []
          selector:
            entity:
              domain: binary_sensor
              multiple: true

    override:
      name: "Manueller Override"
      icon: mdi:hand-back-right
      collapsed: true
      input:
        manual_override_helper:
          name: Input Boolean für manuellen Override
          description: >
            Optional. Wenn dieser Helper auf EIN steht, schaltet die Automation das Kammerlicht nicht automatisch aus.
          default: []
          selector:
            entity:
              domain: input_boolean

    fehler:
      name: "Fehler-Einstellungen"
      icon: mdi:alert-circle
      collapsed: true
      input:
        enable_chamber_blink:
          name: Kammerlicht blinken bei Fehler
          default: true
          selector:
            boolean:

        external_warning_lights:
          name: Externe Fehlerleuchten
          default: []
          selector:
            entity:
              multiple: true
              domain: light

        restore_warning_lights_after_error:
          name: Fehlerleuchten nach Fehlerende wiederherstellen
          default: true
          selector:
            boolean:

        warning_lights_restore_scene:
          name: Szenen-ID für Wiederherstellung
          default: bambu_warning_lights_restore
          selector:
            text:

        warning_light_color:
          name: Fehlerleuchten Farbe
          default: [255, 0, 0]
          selector:
            color_rgb:

        warning_light_brightness:
          name: Fehlerleuchten Helligkeit
          default: 255
          selector:
            number:
              min: 1
              max: 255
              step: 1
              mode: slider

        warning_light_blink_interval:
          name: Blink-Takt Fehlerleuchten (Sekunden)
          default: 1
          selector:
            number:
              min: 0.5
              max: 30
              step: 0.5
              unit_of_measurement: s
              mode: slider

variables:
  print_status_entity: !input print_status_sensor
  current_stage_entity: !input current_stage_sensor
  print_progress_entity: !input print_progress_sensor
  door_entity: !input door_sensor

  status_light_var: !input status_light
  enable_progress_brightness_var: !input enable_progress_brightness
  running_pulse_seconds_var: !input running_pulse_seconds
  finished_pulse_seconds_var: !input finished_pulse_seconds
  error_pulse_seconds_var: !input error_pulse_seconds
  status_error_brightness_var: !input status_error_brightness

  diagnosis_error_sensors_var: !input diagnosis_error_sensors
  manual_override_helper_var: !input manual_override_helper

  enable_chamber_blink_var: !input enable_chamber_blink
  external_warning_lights_var: !input external_warning_lights
  restore_warning_lights_after_error_var: !input restore_warning_lights_after_error
  warning_lights_restore_scene_var: !input warning_lights_restore_scene

  print_status: "{{ states(print_status_entity) }}"
  current_stage: "{{ states(current_stage_entity) }}"
  door_is_open: "{{ is_state(door_entity, 'on') }}"

  is_idle_stage: "{{ current_stage == 'Leerlauf' }}"
  is_running_state: "{{ print_status == 'Läuft' or current_stage == 'Drucken' }}"
  is_prepare_state: >-
    {{ current_stage in [
      'Kühlkammer',
      'Werkzeugkopf wird in die Mitte bewegt',
      'Identifizierung der Bauplatte',
      'Filament wechseln',
      'Kalibrierung der Extrusion',
      'Reinigung der Düsenspitze',
      'Fegen im XY-Mechanik-Modus',
      'Warten darauf, dass das Heizbett die Zieltemperatur erreicht',
      'Automatische Bettnivellierung',
      'Drucken von Kalibrierungslinien'
    ] or print_status == 'Vorbereiten' }}
  is_finished_state: "{{ print_status == 'Fertig' }}"
  is_error_state: >-
    {% set sensor_error = diagnosis_error_sensors_var | count > 0 and (expand(diagnosis_error_sensors_var) | selectattr('state', 'eq', 'on') | list | count > 0) %}
    {{ sensor_error or print_status == 'Fehlgeschlagen' }}

  progress_value: >-
    {% if print_progress_entity is defined and print_progress_entity != [] and states(print_progress_entity) not in ['unknown','unavailable','none','None',''] %}
      {{ states(print_progress_entity) | float(0) }}
    {% else %}
      0
    {% endif %}

  progress_step_percent: >-
    {% set p = progress_value | float(0) %}
    {% set stepped = ((p / 5) | round(0, 'floor') * 5) | int %}
    {{ [5, [100, stepped] | min] | max }}

  progress_brightness: >-
    {% set pct = progress_step_percent | int %}
    {{ ((pct / 100) * 255) | round(0) | int }}

  manual_override_active: >-
    {% if manual_override_helper_var != [] %}
      {{ is_state(manual_override_helper_var, 'on') }}
    {% else %}
      false
    {% endif %}

trigger:
  - platform: state
    entity_id: !input print_status_sensor
    id: print_status_changed

  - platform: state
    entity_id: !input current_stage_sensor
    id: current_stage_changed

  - platform: state
    entity_id: !input print_progress_sensor
    id: print_progress_changed

  - platform: state
    entity_id: !input door_sensor
    id: door_changed

  - platform: state
    entity_id: !input diagnosis_error_sensors
    id: diagnosis_error_changed

action:
  - parallel:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ is_error_state }}"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ external_warning_lights_var | count > 0 and restore_warning_lights_after_error_var and trigger.id == 'diagnosis_error_changed' }}"
                then:
                  - service: scene.create
                    data:
                      scene_id: !input warning_lights_restore_scene
                      snapshot_entities: !input external_warning_lights

              - parallel:
                  - if:
                      - condition: template
                        value_template: "{{ enable_chamber_blink_var }}"
                    then:
                      - repeat:
                          while:
                            - condition: template
                              value_template: "{{ is_error_state }}"
                          sequence:
                            - service: light.turn_on
                              target:
                                entity_id: !input chamber_light
                            - delay:
                                seconds: !input error_pulse_seconds
                            - service: light.turn_off
                              target:
                                entity_id: !input chamber_light
                            - delay:
                                seconds: !input error_pulse_seconds

                  - if:
                      - condition: template
                        value_template: "{{ external_warning_lights_var | count > 0 }}"
                    then:
                      - repeat:
                          while:
                            - condition: template
                              value_template: "{{ is_error_state }}"
                          sequence:
                            - service: light.turn_on
                              target:
                                entity_id: !input external_warning_lights
                              data:
                                rgb_color: !input warning_light_color
                                brightness: !input warning_light_brightness
                            - delay:
                                seconds: !input warning_light_blink_interval
                            - service: light.turn_off
                              target:
                                entity_id: !input external_warning_lights
                            - delay:
                                seconds: !input warning_light_blink_interval

          - conditions:
              - condition: template
                value_template: "{{ not is_error_state }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ external_warning_lights_var | count > 0 and restore_warning_lights_after_error_var and trigger.id == 'diagnosis_error_changed' }}"
                    sequence:
                      - service: scene.turn_on
                        target:
                          entity_id: "scene.{{ warning_lights_restore_scene_var }}"
                  - conditions:
                      - condition: template
                        value_template: "{{ external_warning_lights_var | count > 0 }}"
                    sequence:
                      - service: light.turn_off
                        target:
                          entity_id: !input external_warning_lights

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ is_error_state }}"
            sequence: []

          - conditions:
              - condition: template
                value_template: "{{ is_running_state }}"
            sequence:
              - service: light.turn_on
                target:
                  entity_id: !input chamber_light

          - conditions:
              - condition: template
                value_template: "{{ door_is_open }}"
            sequence:
              - service: light.turn_on
                target:
                  entity_id: !input chamber_light

          - conditions:
              - condition: template
                value_template: "{{ not manual_override_active }}"
            sequence:
              - service: light.turn_off
                target:
                  entity_id: !input chamber_light

      - if:
          - condition: template
            value_template: "{{ status_light_var != [] }}"
        then:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ is_error_state }}"
                sequence:
                  - repeat:
                      while:
                        - condition: template
                          value_template: "{{ is_error_state }}"
                      sequence:
                        - service: light.turn_on
                          target:
                            entity_id: !input status_light
                          data:
                            rgb_color: [255, 0, 0]
                            brightness: !input status_error_brightness
                        - delay:
                            seconds: !input error_pulse_seconds
                        - service: light.turn_off
                          target:
                            entity_id: !input status_light
                        - delay:
                            seconds: !input error_pulse_seconds

              - conditions:
                  - condition: template
                    value_template: "{{ is_finished_state and not door_is_open }}"
                sequence:
                  - repeat:
                      while:
                        - condition: template
                          value_template: "{{ states(print_status_entity) == 'Fertig' and is_state(door_entity, 'off') }}"
                      sequence:
                        - service: light.turn_on
                          target:
                            entity_id: !input status_light
                          data:
                            rgb_color: [0, 255, 0]
                            brightness: 255
                        - delay:
                            seconds: !input finished_pulse_seconds
                        - service: light.turn_off
                          target:
                            entity_id: !input status_light
                        - delay:
                            seconds: !input finished_pulse_seconds

              - conditions:
                  - condition: template
                    value_template: "{{ is_running_state }}"
                sequence:
                  - repeat:
                      while:
                        - condition: template
                          value_template: "{{ states(print_status_entity) == 'Läuft' or states(current_stage_entity) == 'Drucken' }}"
                      sequence:
                        - service: light.turn_on
                          target:
                            entity_id: !input status_light
                          data:
                            rgb_color: [0, 0, 255]
                            brightness: >-
                              {% if enable_progress_brightness_var %}
                                {{ progress_brightness }}
                              {% else %}
                                255
                              {% endif %}
                        - delay:
                            seconds: !input running_pulse_seconds
                        - service: light.turn_off
                          target:
                            entity_id: !input status_light
                        - delay:
                            seconds: !input running_pulse_seconds

              - conditions:
                  - condition: template
                    value_template: "{{ is_prepare_state }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input status_light
                    data:
                      rgb_color: [255, 165, 0]
                      brightness: 128

            default:
              - service: light.turn_off
                target:
                  entity_id: !input status_light

mode: restart
