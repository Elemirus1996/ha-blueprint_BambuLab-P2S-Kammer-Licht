blueprint:
  name: "Bambu Lab – Kammerlicht Steuerung"
  description: >
    Steuert das Kammerlicht des Bambu Lab Druckers automatisch:
    - Licht AN wenn ein Druckauftrag startet
    - Licht AUS wenn der Druckauftrag beendet ist (und Tür geschlossen)
    - Licht AN wenn die Kammertür geöffnet wird
    - Licht AUS wenn die Kammertür geschlossen wird (und kein aktiver Druck läuft)
    - Optional: Kammerlicht blinkt bei Fehler
    - Optional: Zusätzliche Warnleuchte mit Farbe und Blink-Takt bei Fehler
    - Optional: Manueller Override verhindert automatisches Ausschalten
  domain: automation
  author: Elemirus1996
  source_url: https://raw.githubusercontent.com/Elemirus1996/ha-blueprint_BambuLab-P2S-Kammer-Licht/main/blueprints/bambu_lab_kammerlicht.yaml

  input:
    basis:
      name: "Basis-Einstellungen"
      icon: mdi:printer-3d
      input:
        print_status_sensor:
          name: Druckstatus Sensor
          description: >
            Sensor der den aktuellen Druckstatus anzeigt.
            Beispiel: sensor.bambu_p1s_print_status
          selector:
            entity:
              domain: sensor

        door_sensor:
          name: Kammertür Sensor
          description: >
            Binärer Sensor für die Kammertür.
            Beispiel: binary_sensor.bambu_p1s_door_open
          selector:
            entity:
              domain: binary_sensor

        chamber_light:
          name: Kammerlicht
          description: >
            Das Licht in der Druckkammer.
            Beispiel: light.bambu_p1s_chamber_light
          selector:
            entity:
              domain: light

    druckstatus:
      name: "Aktive Druckzustände"
      icon: mdi:playlist-check
      collapsed: true
      input:
        active_print_states:
          name: Aktive Druckzustände
          description: >
            Alle Sensor-Zustände, die als "Druck läuft / Druck aktiv" behandelt werden sollen.
            Passe diese Liste an deine Bambu Lab Integration an.
          default:
            - printing
            - prepare
            - paused
            - resume
            - running
          selector:
            object:

        finished_print_states:
          name: Beendete Druckzustände
          description: >
            Zustände, die als normal beendet gelten.
          default:
            - idle
            - finish
          selector:
            object:

        failed_state:
          name: Fehlerzustand
          description: >
            Sensor-Zustand, der einen Druckfehler signalisiert.
          default: failed
          selector:
            text:

    override:
      name: "Manueller Override"
      icon: mdi:hand-back-right
      collapsed: true
      input:
        manual_override_helper:
          name: Input Boolean für manuellen Override
          description: >
            Optional. Wenn dieser Helper auf EIN steht, schaltet die Automation das Kammerlicht nicht automatisch aus.
            Beispiel: input_boolean.bambu_kammerlicht_override
          default: ""
          selector:
            entity:
              domain: input_boolean

    fehler:
      name: "Fehler-Einstellungen"
      icon: mdi:alert-circle
      collapsed: true
      input:
        enable_chamber_blink:
          name: Kammerlicht blinken bei Fehler
          description: >
            Wenn aktiviert, blinkt das Kammerlicht bei Fehler im 2-Sekunden-Takt.
          default: false
          selector:
            boolean:

        enable_warning_light:
          name: Zusätzliche Warnleuchte aktivieren
          description: >
            Wenn aktiviert, wird bei Fehler eine weitere Leuchte angesteuert.
          default: false
          selector:
            boolean:

        warning_light:
          name: Warnleuchte
          description: >
            Zusätzliche Leuchte für Fehleranzeige.
          default: ""
          selector:
            entity:
              domain: light

        warning_light_color:
          name: Warnleuchte Farbe
          default: [255, 0, 0]
          selector:
            color_rgb:

        warning_light_blink_interval:
          name: Blink-Takt Warnleuchte (Sekunden)
          description: >
            Sekunden zwischen AN und AUS.
          default: 2
          selector:
            number:
              min: 1
              max: 30
              step: 0.5
              unit_of_measurement: s
              mode: slider

variables:
  print_status_entity: !input print_status_sensor
  door_entity: !input door_sensor
  chamber_light_entity: !input chamber_light

  active_print_states_var: !input active_print_states
  finished_print_states_var: !input finished_print_states
  failed_state_var: !input failed_state

  manual_override_helper_var: !input manual_override_helper

  enable_chamber_blink_var: !input enable_chamber_blink
  enable_warning_light_var: !input enable_warning_light
  warning_light_var: !input warning_light
  warning_light_blink_interval_var: !input warning_light_blink_interval

  current_print_state: "{{ states(print_status_entity) }}"
  door_is_open: "{{ is_state(door_entity, 'on') }}"
  print_is_active: "{{ current_print_state in active_print_states_var }}"
  print_has_failed: "{{ current_print_state == failed_state_var }}"
  print_is_finished: "{{ current_print_state in finished_print_states_var }}"
  manual_override_active: >-
    {% if manual_override_helper_var != '' %}
      {{ is_state(manual_override_helper_var, 'on') }}
    {% else %}
      false
    {% endif %}

trigger:
  - platform: state
    entity_id: !input print_status_sensor
    id: print_status_changed

  - platform: state
    entity_id: !input door_sensor
    to: "on"
    id: door_opened

  - platform: state
    entity_id: !input door_sensor
    to: "off"
    id: door_closed

action:
  - choose:

      - conditions:
          - condition: trigger
            id: print_status_changed
          - condition: template
            value_template: "{{ print_is_active }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input chamber_light

      - conditions:
          - condition: trigger
            id: print_status_changed
          - condition: template
            value_template: "{{ print_is_finished }}"
          - condition: state
            entity_id: !input door_sensor
            state: "off"
          - condition: template
            value_template: "{{ not manual_override_active }}"
        sequence:
          - service: light.turn_off
            target:
              entity_id: !input chamber_light

      - conditions:
          - condition: trigger
            id: print_status_changed
          - condition: template
            value_template: "{{ print_has_failed }}"
        sequence:
          - parallel:
              - if:
                  - condition: template
                    value_template: "{{ enable_chamber_blink_var }}"
                then:
                  - repeat:
                      while:
                        - condition: template
                          value_template: "{{ states(print_status_entity) == failed_state_var }}"
                      sequence:
                        - service: light.turn_on
                          target:
                            entity_id: !input chamber_light
                        - delay:
                            seconds: 2
                        - service: light.turn_off
                          target:
                            entity_id: !input chamber_light
                        - delay:
                            seconds: 2

              - if:
                  - condition: template
                    value_template: "{{ enable_warning_light_var and warning_light_var != '' }}"
                then:
                  - repeat:
                      while:
                        - condition: template
                          value_template: "{{ states(print_status_entity) == failed_state_var }}"
                      sequence:
                        - service: light.turn_on
                          target:
                            entity_id: !input warning_light
                          data:
                            rgb_color: !input warning_light_color
                        - delay:
                            seconds: !input warning_light_blink_interval
                        - service: light.turn_off
                          target:
                            entity_id: !input warning_light
                        - delay:
                            seconds: !input warning_light_blink_interval

      - conditions:
          - condition: trigger
            id: print_status_changed
          - condition: template
            value_template: "{{ not print_has_failed }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ enable_warning_light_var and warning_light_var != '' }}"
            then:
              - service: light.turn_off
                target:
                  entity_id: !input warning_light

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ print_is_active or door_is_open }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input chamber_light
            default:
              - if:
                  - condition: template
                    value_template: "{{ not manual_override_active }}"
                then:
                  - service: light.turn_off
                    target:
                      entity_id: !input chamber_light

      - conditions:
          - condition: trigger
            id: door_opened
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input chamber_light

      - conditions:
          - condition: trigger
            id: door_closed
          - condition: template
            value_template: "{{ not print_is_active }}"
          - condition: template
            value_template: "{{ not print_has_failed }}"
          - condition: template
            value_template: "{{ not manual_override_active }}"
        sequence:
          - service: light.turn_off
            target:
              entity_id: !input chamber_light

mode: restart
