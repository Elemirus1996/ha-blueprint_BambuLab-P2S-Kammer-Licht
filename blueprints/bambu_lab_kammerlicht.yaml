blueprint:
  name: "Bambu Lab – Kammerlicht & Status LED (vereinfacht)"
  description: >
    Vereinfachte Steuerung nur mit Druckstatus- und Türsensor.
    Gesteuert werden Kammerlicht und Status-LED.
  domain: automation
  author: Elemirus1996
  source_url: https://raw.githubusercontent.com/Elemirus1996/ha-blueprint_BambuLab-P2S-Kammer-Licht/main/blueprints/bambu_lab_kammerlicht.yaml

  input:
    basis:
      name: "Basis"
      icon: mdi:printer-3d
      input:
        print_status_sensor:
          name: Druckstatus Sensor
          selector:
            entity:
              domain: sensor

        door_sensor:
          name: Gerätetür Sensor
          selector:
            entity:
              domain: binary_sensor

        chamber_light:
          name: Kammerlicht
          selector:
            entity:
              domain: light

        status_led:
          name: Status LED
          selector:
            entity:
              domain: light

    status_modi:
      name: "Status-LED Modi"
      icon: mdi:led-on
      input:
        print_led_mode:
          name: Druck/Pause Modus (Blau)
          default: pulse
          selector:
            select:
              options:
                - label: Statisch
                  value: static
                - label: Pulsierend
                  value: pulse

        finished_led_mode:
          name: Druck fertig Modus (Grün)
          default: pulse
          selector:
            select:
              options:
                - label: Statisch
                  value: static
                - label: Pulsierend
                  value: pulse

        print_pulse_seconds:
          name: Puls-Takt Druck/Pause (Sekunden)
          default: 2
          selector:
            number:
              min: 0.5
              max: 10
              step: 0.5
              unit_of_measurement: s
              mode: slider

        finished_pulse_seconds:
          name: Puls-Takt Druck fertig (Sekunden)
          default: 2
          selector:
            number:
              min: 0.5
              max: 10
              step: 0.5
              unit_of_measurement: s
              mode: slider

        error_pulse_seconds:
          name: Puls-Takt Druckfehler (Sekunden)
          default: 1
          selector:
            number:
              min: 0.5
              max: 10
              step: 0.5
              unit_of_measurement: s
              mode: slider

        finished_light_timeout_minutes:
          name: Kammerlicht nach "Fertig" ausschalten (Minuten)
          default: 5
          selector:
            number:
              min: 1
              max: 60
              step: 1
              unit_of_measurement: min
              mode: slider

variables:
  print_status_entity: !input print_status_sensor
  door_entity: !input door_sensor

  print_led_mode_var: !input print_led_mode
  finished_led_mode_var: !input finished_led_mode
  print_pulse_seconds_var: !input print_pulse_seconds
  finished_pulse_seconds_var: !input finished_pulse_seconds
  error_pulse_seconds_var: !input error_pulse_seconds
  finished_light_timeout_minutes_var: !input finished_light_timeout_minutes

  print_status: "{{ states(print_status_entity) | lower }}"
  door_is_open: "{{ is_state(door_entity, 'on') }}"

  is_printing_state: "{{ print_status in ['running', 'pause', 'printing'] }}"
  is_finished_state: "{{ print_status in ['finish', 'finished'] }}"
  is_error_state: "{{ print_status in ['failed', 'error', 'print_error'] }}"

  status_last_changed_ts: >-
    {% set s = states[print_status_entity] %}
    {{ as_timestamp(s.last_changed) if s is not none else 0 }}

  door_last_changed_ts: >-
    {% set d = states[door_entity] %}
    {{ as_timestamp(d.last_changed) if d is not none else 0 }}

  status_since_seconds: "{{ (as_timestamp(now()) - (status_last_changed_ts | float(0))) | int(0) }}"

  finish_cleared_by_door: >-
    {{ is_finished_state and (not door_is_open) and ((door_last_changed_ts | float(0)) > (status_last_changed_ts | float(0))) }}

  finish_active: "{{ is_finished_state and not finish_cleared_by_door }}"

  finish_window_active: >-
    {{ finish_active and (status_since_seconds < ((finished_light_timeout_minutes_var | int(5)) * 60)) }}

  print_pulse_on: >-
    {% set period = print_pulse_seconds_var | float(2) %}
    {% set t = as_timestamp(now()) | float(0) %}
    {{ ((t / period) | round(0, 'floor') | int) % 2 == 0 }}

  finished_pulse_on: >-
    {% set period = finished_pulse_seconds_var | float(2) %}
    {% set t = as_timestamp(now()) | float(0) %}
    {{ ((t / period) | round(0, 'floor') | int) % 2 == 0 }}

  error_pulse_on: >-
    {% set period = error_pulse_seconds_var | float(1) %}
    {% set t = as_timestamp(now()) | float(0) %}
    {{ ((t / period) | round(0, 'floor') | int) % 2 == 0 }}

trigger:
  - platform: time_pattern
    seconds: "/10"
    id: status_poll

  - platform: time_pattern
    seconds: "/1"
    id: pulse_tick

  - platform: state
    entity_id: !input print_status_sensor
    id: print_status_changed

  - platform: state
    entity_id: !input door_sensor
    id: door_changed

action:
  - if:
      - condition: template
        value_template: >-
          {{ trigger.id == 'pulse_tick'
             and not (
               is_error_state
               or (is_printing_state and print_led_mode_var == 'pulse')
               or (finish_active and finished_led_mode_var == 'pulse')
             ) }}
    then:
      - stop: "Kein Puls-Update nötig"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ is_error_state }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input chamber_light
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ error_pulse_on }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input status_led
                    data:
                      rgb_color: [255, 0, 0]
                      brightness: 255
            default:
              - service: light.turn_off
                target:
                  entity_id: !input status_led

      - conditions:
          - condition: template
            value_template: "{{ is_printing_state }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input chamber_light

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ print_led_mode_var == 'static' }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input status_led
                    data:
                      rgb_color: [0, 0, 255]
                      brightness: 255

              - conditions:
                  - condition: template
                    value_template: "{{ print_pulse_on }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input status_led
                    data:
                      rgb_color: [0, 0, 255]
                      brightness: 255
            default:
              - service: light.turn_off
                target:
                  entity_id: !input status_led

      - conditions:
          - condition: template
            value_template: "{{ finish_active }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ finished_led_mode_var == 'static' }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input status_led
                    data:
                      rgb_color: [0, 255, 0]
                      brightness: 255

              - conditions:
                  - condition: template
                    value_template: "{{ finished_pulse_on }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input status_led
                    data:
                      rgb_color: [0, 255, 0]
                      brightness: 255
            default:
              - service: light.turn_off
                target:
                  entity_id: !input status_led

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ door_is_open or finish_window_active }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input chamber_light
            default:
              - service: light.turn_off
                target:
                  entity_id: !input chamber_light

    default:
      - service: light.turn_off
        target:
          entity_id: !input status_led

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ door_is_open }}"
            sequence:
              - service: light.turn_on
                target:
                  entity_id: !input chamber_light
        default:
          - service: light.turn_off
            target:
              entity_id: !input chamber_light

mode: restart
