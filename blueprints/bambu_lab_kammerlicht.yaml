blueprint:
  name: "Bambu Lab – Kammerlicht Steuerung"
  description: >
    Steuert das Kammerlicht des Bambu Lab Druckers automatisch:
    - Licht AN wenn ein Druckauftrag startet
    - Licht AUS wenn der Druckauftrag beendet ist (und Tür geschlossen)
    - Licht AN wenn die Kammertür geöffnet wird
    - Licht AUS wenn die Kammertür geschlossen wird (und kein aktiver Druck läuft)
    - Optional: Fehlererkennung über Diagnose-Sensoren der ha-bambulab Integration
    - Optional: Kammerlicht blinkt bei Fehler
    - Optional: Mehrere externe Warnleuchten mit Farbe und Blink-Takt bei Fehler
    - Optional: Manueller Override verhindert automatisches Ausschalten
  domain: automation
  author: Elemirus1996
  source_url: https://raw.githubusercontent.com/Elemirus1996/ha-blueprint_BambuLab-P2S-Kammer-Licht/main/blueprints/bambu_lab_kammerlicht.yaml

  input:
    basis:
      name: "Basis-Einstellungen"
      icon: mdi:printer-3d
      input:
        print_status_sensor:
          name: Druckstatus Sensor
          description: >
            Sensor der den aktuellen Druckstatus anzeigt.
            Beispiel: sensor.bambu_p1s_print_status
          selector:
            entity:
              domain: sensor

        door_sensor:
          name: Kammertür Sensor
          description: >
            Binärer Sensor für die Kammertür.
            Beispiel: binary_sensor.bambu_p1s_door_open
          selector:
            entity:
              domain: binary_sensor

        chamber_light:
          name: Kammerlicht
          description: >
            Das Licht in der Druckkammer.
            Beispiel: light.bambu_p1s_chamber_light
          selector:
            entity:
              domain: light

    diagnose:
      name: "Diagnose / Fehlererkennung"
      icon: mdi:stethoscope
      collapsed: true
      input:
        print_error_sensor:
          name: Druckfehler Sensor
          description: >
            Optional. Diagnose-Sensor der ha-bambulab Integration.
            Beispiel: binary_sensor.bambu_p1s_print_error
          default: ""
          selector:
            entity:
              domain: binary_sensor

        hms_error_sensor:
          name: HMS Fehler Sensor
          description: >
            Optional. Diagnose-Sensor der ha-bambulab Integration.
            Beispiel: binary_sensor.bambu_p1s_hms_errors
          default: ""
          selector:
            entity:
              domain: binary_sensor

        failed_state:
          name: Fallback Fehlerzustand im Druckstatus
          description: >
            Nur relevant, wenn keine Diagnose-Sensoren gesetzt sind.
          default: failed
          selector:
            text:

    druckstatus:
      name: "Aktive Druckzustände"
      icon: mdi:playlist-check
      collapsed: true
      input:
        active_print_states:
          name: Aktive Druckzustände
          description: >
            Alle Sensor-Zustände, die als "Druck läuft / Druck aktiv" behandelt werden sollen.
          default:
            - printing
            - prepare
            - paused
            - resume
            - running
          selector:
            object:

        finished_print_states:
          name: Beendete Druckzustände
          description: >
            Zustände, die als normal beendet gelten.
          default:
            - idle
            - finish
          selector:
            object:

    override:
      name: "Manueller Override"
      icon: mdi:hand-back-right
      collapsed: true
      input:
        manual_override_helper:
          name: Input Boolean für manuellen Override
          description: >
            Optional. Wenn dieser Helper auf EIN steht, schaltet die Automation das Kammerlicht nicht automatisch aus.
          default: ""
          selector:
            entity:
              domain: input_boolean

    fehler:
      name: "Fehler-Einstellungen"
      icon: mdi:alert-circle
      collapsed: true
      input:
        enable_chamber_blink:
          name: Kammerlicht blinken bei Fehler
          description: >
            Wenn aktiviert, blinkt das Kammerlicht bei Fehler im 2-Sekunden-Takt.
          default: false
          selector:
            boolean:

        external_warning_lights:
          name: Externe Warnleuchten
          description: >
            Optional. Eine oder mehrere externe Leuchten für Fehleranzeige.
          default: []
          selector:
            entity:
              multiple: true
              domain: light

        warning_light_color:
          name: Warnleuchten Farbe
          default: [255, 0, 0]
          selector:
            color_rgb:

        warning_light_blink_interval:
          name: Blink-Takt Warnleuchten (Sekunden)
          description: >
            Sekunden zwischen AN und AUS.
          default: 2
          selector:
            number:
              min: 1
              max: 30
              step: 0.5
              unit_of_measurement: s
              mode: slider

variables:
  print_status_entity: !input print_status_sensor
  door_entity: !input door_sensor

  print_error_sensor_var: !input print_error_sensor
  hms_error_sensor_var: !input hms_error_sensor
  failed_state_var: !input failed_state

  active_print_states_var: !input active_print_states
  finished_print_states_var: !input finished_print_states

  manual_override_helper_var: !input manual_override_helper

  enable_chamber_blink_var: !input enable_chamber_blink
  external_warning_lights_var: !input external_warning_lights
  warning_light_blink_interval_var: !input warning_light_blink_interval

  current_print_state: "{{ states(print_status_entity) }}"
  door_is_open: "{{ is_state(door_entity, 'on') }}"
  print_is_active: "{{ current_print_state in active_print_states_var }}"
  print_is_finished: "{{ current_print_state in finished_print_states_var }}"

  diagnosis_error_active: >-
    {% set print_err = (print_error_sensor_var != '' and is_state(print_error_sensor_var, 'on')) %}
    {% set hms_err = (hms_error_sensor_var != '' and is_state(hms_error_sensor_var, 'on')) %}
    {% if print_error_sensor_var != '' or hms_error_sensor_var != '' %}
      {{ print_err or hms_err }}
    {% else %}
      {{ current_print_state == failed_state_var }}
    {% endif %}

  manual_override_active: >-
    {% if manual_override_helper_var != '' %}
      {{ is_state(manual_override_helper_var, 'on') }}
    {% else %}
      false
    {% endif %}

trigger:
  - platform: state
    entity_id: !input print_status_sensor
    id: print_status_changed

  - platform: state
    entity_id: !input door_sensor
    to: "on"
    id: door_opened

  - platform: state
    entity_id: !input door_sensor
    to: "off"
    id: door_closed

  - platform: state
    entity_id: !input print_error_sensor
    id: print_error_changed

  - platform: state
    entity_id: !input hms_error_sensor
    id: hms_error_changed

action:
  - choose:

      - conditions:
          - condition: trigger
            id: print_status_changed
          - condition: template
            value_template: "{{ print_is_active }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input chamber_light

      - conditions:
          - condition: trigger
            id: print_status_changed
          - condition: template
            value_template: "{{ print_is_finished }}"
          - condition: state
            entity_id: !input door_sensor
            state: "off"
          - condition: template
            value_template: "{{ not diagnosis_error_active }}"
          - condition: template
            value_template: "{{ not manual_override_active }}"
        sequence:
          - service: light.turn_off
            target:
              entity_id: !input chamber_light

      - conditions:
          - condition: template
            value_template: "{{ diagnosis_error_active }}"
        sequence:
          - parallel:
              - if:
                  - condition: template
                    value_template: "{{ enable_chamber_blink_var }}"
                then:
                  - repeat:
                      while:
                        - condition: template
                          value_template: >-
                            {% set print_err = (print_error_sensor_var != '' and is_state(print_error_sensor_var, 'on')) %}
                            {% set hms_err = (hms_error_sensor_var != '' and is_state(hms_error_sensor_var, 'on')) %}
                            {% if print_error_sensor_var != '' or hms_error_sensor_var != '' %}
                              {{ print_err or hms_err }}
                            {% else %}
                              {{ states(print_status_entity) == failed_state_var }}
                            {% endif %}
                      sequence:
                        - service: light.turn_on
                          target:
                            entity_id: !input chamber_light
                        - delay:
                            seconds: 2
                        - service: light.turn_off
                          target:
                            entity_id: !input chamber_light
                        - delay:
                            seconds: 2

              - if:
                  - condition: template
                    value_template: "{{ external_warning_lights_var | count > 0 }}"
                then:
                  - repeat:
                      while:
                        - condition: template
                          value_template: >-
                            {% set print_err = (print_error_sensor_var != '' and is_state(print_error_sensor_var, 'on')) %}
                            {% set hms_err = (hms_error_sensor_var != '' and is_state(hms_error_sensor_var, 'on')) %}
                            {% if print_error_sensor_var != '' or hms_error_sensor_var != '' %}
                              {{ print_err or hms_err }}
                            {% else %}
                              {{ states(print_status_entity) == failed_state_var }}
                            {% endif %}
                      sequence:
                        - service: light.turn_on
                          target:
                            entity_id: !input external_warning_lights
                          data:
                            rgb_color: !input warning_light_color
                        - delay:
                            seconds: !input warning_light_blink_interval
                        - service: light.turn_off
                          target:
                            entity_id: !input external_warning_lights
                        - delay:
                            seconds: !input warning_light_blink_interval

      - conditions:
          - condition: template
            value_template: "{{ not diagnosis_error_active }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ external_warning_lights_var | count > 0 }}"
            then:
              - service: light.turn_off
                target:
                  entity_id: !input external_warning_lights

          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ print_is_active or door_is_open }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input chamber_light
            default:
              - if:
                  - condition: template
                    value_template: "{{ not manual_override_active }}"
                then:
                  - service: light.turn_off
                    target:
                      entity_id: !input chamber_light

      - conditions:
          - condition: trigger
            id: door_opened
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input chamber_light

      - conditions:
          - condition: trigger
            id: door_closed
          - condition: template
            value_template: "{{ not print_is_active }}"
          - condition: template
            value_template: "{{ not diagnosis_error_active }}"
          - condition: template
            value_template: "{{ not manual_override_active }}"
        sequence:
          - service: light.turn_off
            target:
              entity_id: !input chamber_light

mode: restart
